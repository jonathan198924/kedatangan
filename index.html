body{font-family:'Segoe UI',sans-serif;background:#f0f2f0;color:#1a1a1a;min-height:100vh}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo h1{color:#1a5c2a;font-size:22px;font-weight:700}
.login-logo p{color:#757575;font-size:13px;margin-top:4px}
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:12px;font-weight:600;color:#757575;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.fg select,.fg input{width:100%;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
.fg select:focus,.fg input:focus{border-color:#1a5c2a}
.btn-login{width:100%;padding:12px;background:#1a5c2a;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.login-hint{text-align:center;font-size:11px;color:#757575;margin-top:12px}
#app{display:none}
.topbar{background:#1a5c2a;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:700}
.topbar-sub{font-size:11px;opacity:.8;margin-top:2px}
.role-badge{background:rgba(255,255,255,.2);border-radius:99px;padding:3px 10px;font-size:11px;font-weight:600}
.btn-logout{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
.nav-tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;overflow-x:auto}
.nav-tab{padding:12px 16px;font-size:13px;font-weight:500;color:#757575;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px}
.nav-tab.active{color:#1a5c2a;border-bottom-color:#1a5c2a;font-weight:600}
.content{padding:1rem;max-width:600px;margin:0 auto}
.card{background:#fff;border-radius:10px;padding:1rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card-title{font-size:14px;font-weight:700;color:#1a5c2a;margin-bottom:12px}
.sec-label{font-size:11px;font-weight:700;color:#757575;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.company-select{width:100%;padding:10px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;background:#fff;margin-bottom:1rem;outline:none}
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:1rem}
.stat-box{background:#fff;border-radius:8px;padding:8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.stat-num{font-size:20px;font-weight:700}
.stat-label{font-size:10px;color:#757575;margin-top:2px}
.worker-row{display:flex;flex-direction:column;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f5f5f5}
.worker-row:last-child{border:none}
.worker-name{font-size:14px;font-weight:500}
.worker-meta{font-size:11px;color:#757575}
.status-btn{padding:5px 10px;border-radius:99px;font-size:11px;font-weight:700;border:none;cursor:default;min-width:70px;text-align:center}
.s-present{background:#e8f5eb;color:#2d7a3e}
.s-late{background:#fef3e2;color:#d35400}
.s-absent{background:#fdecea;color:#c0392b}
.s-medical{background:#fef3e2;color:#e67e22}
.s-mi{background:#e8f0fa;color:#1a4a7a}
.s-mia{background:#f3e8ff;color:#6b21a8}
.s-none{background:#f5f5f5;color:#757575}

.sp-btn{padding:5px 10px;border-radius:99px;font-size:11px;font-weight:700;border:2px solid;cursor:pointer}

.sp-mia{background:#f3e8ff;color:#6b21a8;border-color:#6b21a8}

.time-label{font-size:11px;color:#757575;font-weight:600;margin-bottom:4px}

.note-time{color:#757575;font-size:10px}

.btn{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;margin-bottom:4px}

.btn-danger{background:#fdecea;color:#c0392b}
.btn-wa{background:#25D366;color:#fff}

.worker-admin-row:last-child{border:none}

.wi-meta{font-size:11px;color:#757575}

.badge-pending{background:#fef3e2;color:#e67e22;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
.report-table{width:100%;border-collapse:collapse;font-size:12px}

.report-table td{padding:7px 10px;border-bottom:1px solid #f5f5f5;vertical-align:middle}

var currentUser = null;

function todayStr() { var d=new Date(); var y=d.getFullYear(); var mo=String(d.getMonth()+1).padStart(2,'0'); var dy=String(d.getDate()).padStart(2,'0'); return y+'-'+mo+'-'+dy; }

function fmtDate(d) {
  if(!d) return '';
  var dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'numeric'});
}

function saveDB() { try { localStorage.setItem('mercy_v9', JSON.stringify(DB)); } catch(e){} }

function loadDB() {
  try {
    ['mercy_v4','mercy_v3','mercy_v2','mercy_v1','mercy_db'].forEach(function(k){localStorage.removeItem(k);});
    var s = localStorage.getItem('mercy_v9');
    if(s) { var saved = JSON.parse(s); if(saved && saved.version === 9) { DB = saved; return; } }
  } catch(e){}
}

loadDB();

function prefillLogin() {
  var r = document.getElementById('login-role').value;
  document.getElementById('login-user').value = r === 'master' ? 'master' : r === 'admin' ? 'admin' : 'supervisor';
}

function doLogin() {
  var role = document.getElementById('login-role').value;
  var user = document.getElementById('login-user').value.trim();
  var pass = document.getElementById('login-pass').value;
  var users = DB.users[role] || [];
  var found = null;
  for(var i=0;i<users.length;i++) { if(users[i].username===user && users[i].password===pass){found=users[i];break;} }
  if(!found) { alert('Invalid username or password.'); return; }
  currentUser = found; currentRole = role;
  selectedCompany = getUserCompanies()[0] ? getUserCompanies()[0].id : 'c6';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('role-badge').textContent = role.charAt(0).toUpperCase()+role.slice(1);
  document.getElementById('topbar-sub').textContent = found.name;
  buildNav();
  showTab('attendance');
}

function doLogout() {
  currentUser=null; currentRole=null; currentTab='attendance';
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-pass').value='';
}

function getUserCompanies() {
  if(currentRole==='master') return DB.companies;
  return DB.companies.filter(function(c){ return (currentUser.companies||[]).indexOf(c.id)!==-1; });
}

function buildNav() {
  var tabDefs = {master:['attendance','reports','admin','master'],admin:['attendance','reports','admin'],supervisor:['attendance','reports']};
  var labels = {attendance:'Attendance',reports:'Reports',admin:'Manage Workers',master:'Master Control'};
  var tabs = tabDefs[currentRole] || ['attendance'];
  var html = '';
  tabs.forEach(function(t){
    html += '<div class="nav-tab' + (t===currentTab?' active':'') + '" onclick="showTab(\'' + t + '\')">' + labels[t] + '</div>';
  });
  document.getElementById('nav-tabs').innerHTML = html;
}

function showTab(tab) {
  currentTab = tab;
  buildNav();
  var c = document.getElementById('main-content');
  if(tab==='attendance') c.innerHTML = buildAttendance();
  else if(tab==='reports') c.innerHTML = buildReports();
  else if(tab==='admin') c.innerHTML = buildAdmin();
  else if(tab==='master') c.innerHTML = buildMasterControl();
  fillCompanyDropdowns();
}

function fillCompanyDropdowns() {
  var companies = getUserCompanies();
  ['co-att','co-adm','co-rep'].forEach(function(id){
    var el = document.getElementById(id);
    if(!el) return;
    el.innerHTML = '';
    if(id==='co-rep' && currentRole==='master') {
      var opt = document.createElement('option'); opt.value='all'; opt.textContent='All Companies'; el.appendChild(opt);
    }
    companies.forEach(function(c){
      var opt = document.createElement('option');
      opt.value = c.id; opt.textContent = c.name;
      if(c.id===selectedCompany) opt.selected = true;
      el.appendChild(opt);
    });
  });
}

// ── ATTENDANCE ────────────────────────────────────────────────────
function buildAttendance() {
  var companies = getUserCompanies();
  if(!selectedCompany || !companies.filter(function(c){return c.id===selectedCompany;}).length) selectedCompany = companies[0]?companies[0].id:'c6';
  var workers = DB.workers.filter(function(w){return w.cid===selectedCompany && w.status==='active';});
  var dateKey = currentDate+'_'+selectedCompany;
  var att = DB.attendance[dateKey] || {};
  var p=0,late=0,a=0,m=0,mi=0,mia=0;
  workers.forEach(function(w){
    var s = att[w.id] ? att[w.id].status : null;
    if(s==='Present')p++; else if(s==='Late')late++; else if(s==='Absent')a++; else if(s==='Medical')m++; else if(s==='MI')mi++; else if(s==='MIA')mia++;
  });

  var html = '<select class="company-select" id="co-att" onchange="selectedCompany=this.value;showTab(\'attendance\')"></select>';
  html += '<div class="date-nav">';
  html += '<button onclick="changeDate(-1)">&#8249;</button>';
  html += '<span>' + fmtDate(currentDate) + '</span>';
  html += '<button onclick="changeDate(1)"' + (currentDate>=todayStr()?' disabled':'') + '>&#8250;</button>';
  html += '<button onclick="currentDate=todayStr();showTab(\'attendance\')" style="font-size:11px;padding:6px 8px;">Today</button>';
  html += '</div>';
  html += '<div class="stats-row">';
  html += '<div class="stat-box"><div class="stat-num" style="color:#2d7a3e">'+p+'</div><div class="stat-label">Present</div></div>';
  html += '<div class="stat-box"><div class="stat-num" style="color:#d35400">'+late+'</div><div class="stat-label">Late</div></div>';
  html += '<div class="stat-box"><div class="stat-num" style="color:#c0392b">'+a+'</div><div class="stat-label">Absent</div></div>';
  html += '<div class="stat-box"><div class="stat-num" style="color:#e67e22">'+m+'</div><div class="stat-label">Medical</div></div>';
  html += '<div class="stat-box"><div class="stat-num" style="color:#1a4a7a">'+mi+'</div><div class="stat-label">MI</div></div>';
  html += '<div class="stat-box"><div class="stat-num" style="color:#6b21a8">'+mia+'</div><div class="stat-label">MIA</div></div>';
  html += '</div>';
  html += '<div class="card"><div class="card-title">Worker Attendance \u2014 ' + fmtDate(currentDate) + '</div>';
  if(!workers.length) { html += '<div class="empty-state">No active workers.</div>'; }
  else { workers.forEach(function(w){ html += buildWorkerRow(w, att, dateKey); }); }
  html += '</div>';
  html += '<button class="btn btn-wa btn-full" onclick="sendAttWA()">Send via WhatsApp</button>';
  return html;
}

function buildWorkerRow(w, att, dateKey) {
  var entry = att[w.id] || {};
  var status = entry.status || null;
  var locked = !!status;
  var notes = entry.notes || [];
  var showTime = (status==='Present'||status==='Late');
  var sc = status ? 's-'+status.toLowerCase() : 's-none';

  var html = '<div class="worker-row">';
  html += '<div style="display:flex;align-items:center;gap:8px;width:100%">';
  html += '<div style="flex:1"><div class="worker-name">'+w.name+'</div><div class="worker-meta">Joined: '+fmtDate(w.joinDate)+'</div></div>';
  html += '<span class="status-btn '+sc+'">'+(status||'Not Set')+(locked?' \uD83D\uDD12':'')+'</span>';
  html += '</div>';

  if(!locked) {
    html += '<div class="sp-wrap">';
    var statuses = [['Present','sp-present'],['Late','sp-late'],['Absent','sp-absent'],['Medical','sp-medical'],['MI','sp-mi'],['MIA','sp-mia']];
    statuses.forEach(function(sv){
      html += '<button class="sp-btn '+sv[1]+'" onclick="markStatus(\''+dateKey+'\',\''+w.id+'\',\''+sv[0]+'\')">'+sv[0]+'</button>';
    });
    html += '</div>';
  }

  if(locked && showTime) {
    html += '<div class="time-wrap">';
    html += '<div class="time-group"><div class="time-label">ENTRY TIME</div><div class="time-selects">';
    html += buildTimeSelect('entryH', dateKey, w.id, entry, 'hour');
    html += buildTimeSelect('entryM', dateKey, w.id, entry, 'min');
    html += buildTimeSelect('entryAmPm', dateKey, w.id, entry, 'ampm');
    html += '</div></div>';
    html += '<div class="time-group"><div class="time-label">EXIT TIME</div><div class="time-selects">';
    html += buildTimeSelect('exitH', dateKey, w.id, entry, 'hour');
    html += buildTimeSelect('exitM', dateKey, w.id, entry, 'min');
    html += buildTimeSelect('exitAmPm', dateKey, w.id, entry, 'ampm');
    html += '</div></div>';
    if(entry.entryH) {
      html += '<div style="font-size:11px;color:#757575;width:100%">In: '+pad(entry.entryH)+':'+pad(entry.entryM||0)+' '+(entry.entryAmPm||'AM')+'&nbsp;&nbsp;Out: '+(entry.exitH?pad(entry.exitH)+':'+pad(entry.exitM||0)+' '+(entry.exitAmPm||'PM'):'Not set')+'</div>';
    }
    html += '</div>';
  }

  if(locked) {
    html += '<div style="width:100%;margin-top:6px">';
    notes.forEach(function(n){ html += '<div class="note-item"><span class="note-time">'+n.time+'</span> \u2014 '+n.text+'</div>'; });
    html += '<div class="note-row"><input class="note-input" id="ni-'+w.id+'" placeholder="Add note..."><button class="btn-note" onclick="addNote(\''+dateKey+'\',\''+w.id+'\')">Add</button></div>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function buildTimeSelect(field, dateKey, wid, entry, type) {
  var html = '<select class="time-sel" onchange="saveTime(\''+dateKey+'\',\''+wid+'\',\''+field+'\',this.value)">';
  if(type==='hour') {
    for(var h=1;h<=12;h++) html += '<option value="'+h+'"'+(entry[field]==h?' selected':'')+'>'+pad(h)+'</option>';
  } else if(type==='min') {
    for(var mn=0;mn<60;mn++) html += '<option value="'+mn+'"'+(entry[field]==mn?' selected':'')+'>'+pad(mn)+'</option>';
  } else {
    html += '<option value="AM"'+(entry[field]==='AM'?' selected':'')+'>AM</option>';
    html += '<option value="PM"'+(entry[field]==='PM'?' selected':'')+'>PM</option>';
  }
  html += '</select>';
  return html;
}

function localDateStr(d) { var y=d.getFullYear(); var mo=String(d.getMonth()+1).padStart(2,'0'); var dy=String(d.getDate()).padStart(2,'0'); return y+'-'+mo+'-'+dy; }
function getDateRange(type, dateStr) {
  var d = new Date(dateStr+'T00:00:00');
  if(type==='daily') return [dateStr,dateStr];
  if(type==='weekly') {
    var day=d.getDay(); var mon=new Date(d); mon.setDate(d.getDate()-(day===0?6:day-1));
    var sun=new Date(mon); sun.setDate(mon.getDate()+6);
    return [localDateStr(mon), localDateStr(sun)];
  }
  var start=new Date(d.getFullYear(),d.getMonth(),1);
  var end=new Date(d.getFullYear(),d.getMonth()+1,0);
  return [localDateStr(start), localDateStr(end)];
}

function getDates(start, end) {
  var dates=[]; var cur=new Date(start+'T00:00:00'); var endD=new Date(end+'T00:00:00');
  while(cur<=endD){
    var y=cur.getFullYear(); var mo=String(cur.getMonth()+1).padStart(2,'0'); var d=String(cur.getDate()).padStart(2,'0');
    dates.push(y+'-'+mo+'-'+d);
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

  html += '</div>';

  if(!locked) {
    var pairs = [['Present','sp-present'],['Late','sp-late'],['Absent','sp-absent'],['Medical','sp-medical'],['MI','sp-mi'],['MIA','sp-mia']];
    html += '<div class="status-picker">';
    for(var pi=0; pi<pairs.length; pi++) {
      var dkEnc = encodeURIComponent(dateKey);
      var widEnc = encodeURIComponent(w.id);
      var stEnc = pairs[pi][0];
      html += '<button class="sp-btn ' + pairs[pi][1] + '" onclick="setStatusEnc(decodeURIComponent('' + dkEnc + ''),decodeURIComponent('' + widEnc + ''),'' + stEnc + '')">' + pairs[pi][0] + '</button>';
    }
    html += '</div>';
  }

  if(locked && showTime) {
    var dkE = encodeURIComponent(dateKey);
    var wE = encodeURIComponent(w.id);
    function buildSel(field, max, padded, current, isAmPm) {
      var s = '<select style="flex:1;padding:6px;border:1px solid #e0e0e0;border-radius:6px;font-size:12px;" onchange="saveTimeEnc(decodeURIComponent('' + dkE + ''),decodeURIComponent('' + wE + ''),'' + field + '',this.value)">';
      if(isAmPm) {
        s += '<option value="AM"' + (current==='AM'?' selected':'') + '>AM</option>';
        s += '<option value="PM"' + (current==='PM'?' selected':'') + '>PM</option>';
      } else {
        for(var n=1; n<=max; n++) {
          var val = padded ? String(n).padStart(2,'0') : n;
          s += '<option value="' + n + '"' + (current==n?' selected':'') + '>' + String(n).padStart(2,'0') + '</option>';
        }
      }
      return s + '</select>';
    }
    function buildSelMin(field, current) {
      var s = '<select style="flex:1;padding:6px;border:1px solid #e0e0e0;border-radius:6px;font-size:12px;" onchange="saveTimeEnc(decodeURIComponent('' + dkE + ''),decodeURIComponent('' + wE + ''),'' + field + '',this.value)">';
      for(var n=0; n<60; n++) {
        s += '<option value="' + n + '"' + (current==n?' selected':'') + '>' + String(n).padStart(2,'0') + '</option>';
      }
      return s + '</select>';
    }

    html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0">';
    html += '<div style="flex:1;min-width:140px"><div style="font-size:11px;color:#757575;font-weight:600;margin-bottom:4px">ENTRY TIME</div>';
    html += '<div style="display:flex;gap:4px">';
    html += buildSel('entryH', 12, true, entry.entryH, false);
    html += buildSelMin('entryM', entry.entryM);
    html += buildSel('entryAmPm', 0, false, entry.entryAmPm||'AM', true);
    html += '</div></div>';
    html += '<div style="flex:1;min-width:140px"><div style="font-size:11px;color:#757575;font-weight:600;margin-bottom:4px">EXIT TIME</div>';
    html += '<div style="display:flex;gap:4px">';
    html += buildSel('exitH', 12, true, entry.exitH, false);
    html += buildSelMin('exitM', entry.exitM);
    html += buildSel('exitAmPm', 0, false, entry.exitAmPm||'PM', true);
    html += '</div></div>';
    if(entry.entryH) {
      html += '<div style="font-size:11px;color:#757575;width:100%;margin-top:4px">In: ' + String(entry.entryH).padStart(2,'0') + ':' + String(entry.entryM||0).padStart(2,'0') + ' ' + (entry.entryAmPm||'AM') + '&nbsp;&nbsp;Out: ' + (entry.exitH ? String(entry.exitH).padStart(2,'0')+':'+String(entry.exitM||0).padStart(2,'0')+' '+(entry.exitAmPm||'PM') : 'Not set') + '</div>';
    }
    html += '</div>';
  }

  if(locked) {
    var notes = entry.notes || [];
    html += '<div style="width:100%;margin-top:6px">';
    for(var ni=0; ni<notes.length; ni++) {
      html += '<div class="note-item"><span class="note-time">' + notes[ni].time + '</span> — ' + notes[ni].text + '</div>';
    }
    var dkN = encodeURIComponent(dateKey);
    var wN = encodeURIComponent(w.id);
    html += '<div class="note-row"><input class="note-input" id="note-' + w.id + '" placeholder="Add note..."><button class="btn-note" onclick="addNoteEnc(decodeURIComponent('' + dkN + ''),decodeURIComponent('' + wN + ''))">Add</button></div>';
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function setStatusEnc(dateKey, wid, status) {
  setStatus(dateKey, wid, status);
}

function saveTimeEnc(dateKey, wid, field, value) {
  saveTime(dateKey, wid, field, value);
}

function addNoteEnc(dateKey, wid) {
  addNote(dateKey, wid);
}

</script>

</body>
</html>
